name: Deploy frontend example

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  prepare-build-args:
    runs-on: ubuntu-latest
    outputs:
      build_args: ${{ steps.args.outputs.build_args }}
    steps:
      - id: args
        shell: bash
        env:
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
        run: |
          set -euo pipefail

          {
            echo "build_args<<EOF"

            if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
              echo "NODE_ENV=production"
              echo "NEXT_PUBLIC_API_URL=https://api.example.local"
              echo "NEXT_PUBLIC_AUTH_URL=https://api.example.local"
            else
              echo "NODE_ENV=development"
              echo "NEXT_PUBLIC_API_URL=http://backend-dev.example.local"
              echo "NEXT_PUBLIC_AUTH_URL=http://backend-dev.example.local"
            fi

            [ -n "$NEXT_PUBLIC_GOOGLE_CLIENT_ID" ] && echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID=$NEXT_PUBLIC_GOOGLE_CLIENT_ID"
            [ -n "$NEXT_PUBLIC_GOOGLE_MAPS_API_KEY" ] && echo "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=$NEXT_PUBLIC_GOOGLE_MAPS_API_KEY"

            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  deploy:
    needs: prepare-build-args
    uses: RADOSTb24/cloud-native-cicd-template/.github/workflows/deploy-web-service.yml@master
    with:
      component_name: frontend
      deploy_mode: kubernetes
      image_name: example/frontend-service
      container_name: example-frontend
      release_name: frontend
      app_port: "3000"
      host_port: "3000"
      namespace_prod: example-prod
      namespace_dev: example-dev

      templates_repo: RADOSTb24/cloud-native-cicd-template
      templates_ref: v1
      templates_chart_path: helm/web-service

      values_files: |
        deploy/values.yaml
        deploy/values-${{ github.ref_name == 'main' && 'prod' || 'dev' }}.yaml

      docker_context: .
      dockerfile: ./Dockerfile
      build_args: ${{ needs.prepare-build-args.outputs.build_args }}
      test_command: npm test
      test_language: node
      node_version: "20"
      verify_rollout_name: frontend
    secrets:
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_PAT: ${{ secrets.GHCR_PAT }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      CLOUDFLEET_ACCESS_TOKEN_ID: ${{ secrets.CLOUDFLEET_ACCESS_TOKEN_ID }}
      CLOUDFLEET_ACCESS_TOKEN_SECRET: ${{ secrets.CLOUDFLEET_ACCESS_TOKEN_SECRET }}
      CLOUDFLEET_ORGANIZATION_ID: ${{ secrets.CLOUDFLEET_ORGANIZATION_ID }}
      CLOUDFLEET_CLUSTER_ID: ${{ secrets.CLOUDFLEET_CLUSTER_ID }}