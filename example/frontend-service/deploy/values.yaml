nameOverride: frontend

replicaCount: 1

image:
  repository: ghcr.io
  image: example/frontend-service
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-secret

ports:
  - name: http
    containerPort: 3000
    protocol: TCP

service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 3000
  protocol: TCP

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts: []
  tls: []

resources:
  limits:
    cpu: "500m"
    memory: 512Mi
  requests:
    cpu: "200m"
    memory: 256Mi

revisionHistoryLimit: 3

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 25%
    maxSurge: 25%

readinessProbe:
  enabled: false

livenessProbe:
  enabled: false

startupProbe:
  enabled: false

configMap:
  enabled: false
  data: {}

secret:
  enabled: false
  data: {}

env: []

nodeSelector: {}
tolerations: []
affinity: {}

volumes: []
volumeMounts: []

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies: []
    scaleUp:
      stabilizationWindowSeconds: 0
      policies: []
  metrics: []