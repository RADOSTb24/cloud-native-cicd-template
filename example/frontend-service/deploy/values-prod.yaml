image:
  tag: production
  pullPolicy: IfNotPresent

replicaCount: 2

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: frontend.example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: "700m"
    memory: 768Mi
  requests:
    cpu: "300m"
    memory: 384Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75